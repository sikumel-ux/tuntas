<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Dashboard TUNTAS RT 04</title>
    
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 16px 16px;
        }
        /* Sembunyikan scrollbar bawaan browser tapi fungsi scroll tetap aktif */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .active-nav {
            color: #059669 !important;
        }
    </style>
</head>
<body class="min-h-screen pb-24 antialiased text-slate-800">

    <!-- TOP HEADER -->
    <header class="bg-white border-b border-slate-100 sticky top-0 z-40 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold text-[#064e3b] tracking-wider">TUNTAS.</h1>
                <p class="text-[10px] font-bold text-[#059669] uppercase tracking-widest">Manajemen Iuran RT 04</p>
            </div>
            <div class="flex items-center gap-2 bg-emerald-50 border border-emerald-100 px-3 py-1.5 rounded-full">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-[10px] font-extrabold text-emerald-700 uppercase tracking-wider">Online</span>
            </div>
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <main class="max-w-4xl mx-auto px-4 pt-4">
        
        <!-- SECTION 1: TAB HOME (RINGKASAN & INPUT) -->
        <section id="sec-home" class="tab-content space-y-4">
            
            <!-- RINGKASAN KAS KECIL (GRID KARTU) -->
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm flex flex-col justify-between">
                    <span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Total Kas</span>
                    <h3 id="statTotalSaldo" class="text-lg font-extrabold text-slate-800 mt-1">Rp 0</h3>
                </div>
                <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm flex flex-col justify-between">
                    <span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Bulan Berjalan</span>
                    <h3 id="statTransaksiBulan" class="text-lg font-extrabold text-[#059669] mt-1">0 Transaksi</h3>
                </div>
            </div>

            <!-- FORM INPUT IURAN -->
            <div class="bg-white border border-slate-100 rounded-3xl p-5 shadow-sm space-y-4">
                <div class="flex items-center gap-2 pb-2 border-b border-slate-100">
                    <i class="fa-solid fa-square-plus text-[#059669]"></i>
                    <h2 class="text-xs font-extrabold text-slate-700 uppercase tracking-wider">Catat Pembayaran Baru</h2>
                </div>
                
                <form id="formIuran" class="space-y-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wide mb-1">Nama Warga</label>
                        <input type="text" id="namaWarga" required placeholder="NAMA WARGA (MISAL: SYAMSUDIN)" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-[#059669] text-slate-800 font-bold uppercase placeholder:text-slate-300">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wide mb-1">Nomor WhatsApp Warga</label>
                        <input type="tel" id="noHp" placeholder="628xxxxxxxxxx" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-[#059669] text-slate-800 font-mono">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wide mb-1">Pilih Bulan</label>
                            <select id="bulanIuran" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-[#059669] text-slate-800 font-semibold">
                                <option value="Januari">Januari</option><option value="Februari">Februari</option>
                                <option value="Maret">Maret</option><option value="April">April</option>
                                <option value="Mei">Mei</option><option value="Juni">Juni</option>
                                <option value="Juli">Juli</option><option value="Agustus">Agustus</option>
                                <option value="September">September</option><option value="Oktober">Oktober</option>
                                <option value="November">November</option><option value="Desember">Desember</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wide mb-1">Nominal (Rp)</label>
                            <input type="number" id="nominal" value="50000" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-[#059669] text-[#064e3b] font-extrabold">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wide mb-1">Tanggal Bayar</label>
                        <input type="date" id="tanggalBayar" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-[#059669] text-slate-800 font-mono font-semibold">
                    </div>
                    <button type="submit" class="w-full bg-[#059669] hover:bg-[#047857] text-white font-extrabold py-3 rounded-xl transition shadow-md shadow-emerald-100 text-xs flex items-center justify-center gap-2 uppercase tracking-widest pt-3.5">
                        <i class="fa-solid fa-paper-plane"></i> Kirim WhatsApp & Cetak
                    </button>
                </form>
            </div>
        </section>

        <!-- SECTION 2: TAB MATRIX (REKAP DATA WARGA) -->
        <section id="sec-matrix" class="tab-content hidden space-y-4">
            <div class="bg-white border border-slate-100 rounded-3xl p-4 shadow-sm space-y-3">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 pb-2 border-b border-slate-100">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-table-cells text-[#059669]"></i>
                        <h2 class="text-xs font-extrabold text-slate-700 uppercase tracking-wider">Matrix Tahunan Warga</h2>
                    </div>
                    <div class="relative">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-xs text-slate-400"></i>
                        <input type="text" id="cariWarga" onkeyup="filterTabelWarga()" placeholder="Cari nama..." class="bg-slate-50 border border-slate-200 rounded-xl pl-8 pr-3 py-1.5 text-xs focus:outline-none focus:border-[#059669] w-full sm:w-44 text-slate-800">
                    </div>
                </div>

                <div class="overflow-x-auto no-scrollbar">
                    <table class="w-full text-center text-[10px] border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-500 font-bold border border-slate-100">
                                <th class="p-2 text-left min-w-[110px] border border-slate-100">Nama Warga</th>
                                <th class="p-1 border border-slate-100">Jan</th><th class="p-1 border border-slate-100">Feb</th>
                                <th class="p-1 border border-slate-100">Mar</th><th class="p-1 border border-slate-100">Apr</th>
                                <th class="p-1 border border-slate-100">Mei</th><th class="p-1 border border-slate-100">Jun</th>
                                <th class="p-1 border border-slate-100">Jul</th><th class="p-1 border border-slate-100">Agu</th>
                                <th class="p-1 border border-slate-100">Sep</th><th class="p-1 border border-slate-100">Okt</th>
                                <th class="p-1 border border-slate-100">Nov</th><th class="p-1 border border-slate-100">Des</th>
                            </tr>
                        </thead>
                        <tbody id="bodyMatrixWarga" class="divide-y divide-slate-100">
                            <!-- Di-load dinamis -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- SECTION 3: TAB LOG HISTORY (KRONOLOGI) -->
        <section id="sec-history" class="tab-content hidden space-y-4">
            <div class="bg-white border border-slate-100 rounded-3xl p-4 shadow-sm space-y-3">
                <div class="flex items-center gap-2 pb-2 border-b border-slate-100">
                    <i class="fa-solid fa-clock-rotate-left text-amber-500"></i>
                    <h2 class="text-xs font-extrabold text-slate-700 uppercase tracking-wider">Log Transaksi Terakhir</h2>
                </div>
                <div class="overflow-x-auto no-scrollbar">
                    <table class="w-full text-left text-xs">
                        <thead>
                            <tr class="border-b border-slate-100 text-slate-400 font-bold">
                                <th class="py-2">Warga</th>
                                <th class="py-2">Bulan</th>
                                <th class="py-2">Nominal</th>
                                <th class="py-2 text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabelRiwayat" class="divide-y divide-slate-50">
                            <!-- Di-load dinamis -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <!-- PERSISTENT BOTTOM NAVIGATION BAR -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 shadow-xl z-50 rounded-t-2xl">
        <div class="max-w-md mx-auto flex justify-around items-center py-2.5 text-center">
            
            <button onclick="switchTab('home')" id="nav-home" class="flex flex-col items-center gap-1 text-slate-400 hover:text-[#059669] font-bold text-[10px] uppercase tracking-wide active-nav transition w-full">
                <i class="fa-solid fa-house-chimney text-lg"></i>
                <span>Beranda</span>
            </button>
            
            <button onclick="switchTab('matrix')" id="nav-matrix" class="flex flex-col items-center gap-1 text-slate-400 hover:text-[#059669] font-bold text-[10px] uppercase tracking-wide transition w-full">
                <i class="fa-solid fa-table-cells text-lg"></i>
                <span>Matrix</span>
            </button>
            
            <button onclick="switchTab('history')" id="nav-history" class="flex flex-col items-center gap-1 text-slate-400 hover:text-[#059669] font-bold text-[10px] uppercase tracking-wide transition w-full">
                <i class="fa-solid fa-clock-rotate-left text-lg"></i>
                <span>Riwayat</span>
            </button>
            
        </div>
    </nav>

    <!-- SCRIPT LOGIKA DASHBOARD -->
    <script>
        const DB_URL = "https://tuntas-04-default-rtdb.asia-southeast1.firebasedatabase.app";
        const DAFTAR_BULAN = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

        document.getElementById('tanggalBayar').valueAsDate = new Date();

        // 1. SISTEM PERPINDAHAN TAB NAVIGASI BAWAH
        function switchTab(tabName) {
            // Sembunyikan semua konten tab
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            // Tampilkan konten tab terpilih
            document.getElementById(`sec-${tabName}`).classList.remove('hidden');

            // Reset status tombol navigasi bawah
            document.getElementById('nav-home').classList.remove('active-nav');
            document.getElementById('nav-matrix').classList.remove('active-nav');
            document.getElementById('nav-history').classList.remove('active-nav');

            // Aktifkan tombol yang diklik
            document.getElementById(`nav-${tabName}`).classList.add('active-nav');
        }

        // 2. SUBMIT DATA IURAN BARU
        document.getElementById('formIuran').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nama = document.getElementById('namaWarga').value.toUpperCase().trim();
            const hp = document.getElementById('noHp').value.trim();
            const bulan = document.getElementById('bulanIuran').value;
            const nominal = document.getElementById('nominal').value;
            const tanggal = document.getElementById('tanggalBayar').value;
            const token = "T-" + Math.floor(100000 + Math.random() * 900000);

            const payload = {
                nama_warga: nama,
                no_hp: hp,
                bulan: bulan,
                nominal: nominal,
                tanggal: tanggal,
                token_kuitansi: token
            };

            try {
                const res = await fetch(`${DB_URL}/iuran_sampah.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    alert(`Data Berhasil Disimpan!\nToken Kuitansi: ${token}`);
                    document.getElementById('namaWarga').value = "";
                    
                    const linkKuitansi = `https://sikumel-ux.github.io/Tuntas/kuitansi/?id=${token}`;
                    const pesanWA = `Halo Bapak/Ibu *${nama}*, Terima kasih telah melakukan pembayaran iuran sampah TUNTAS RT 04 untuk bulan *${bulan.toUpperCase()}* sebesar *Rp ${parseInt(nominal).toLocaleString('id-ID')}*.\n\nBerikut adalah bukti kuitansi pembayaran resmi Anda yang dapat diakses melalui tautan di bawah ini:\n\n${linkKuitansi}\n\n_Pesan ini dibuat otomatis oleh Tuntas Management._`;
                    
                    window.open(`https://api.whatsapp.com/send?phone=${hp}&text=${encodeURIComponent(pesanWA)}`, '_blank');
                    
                    segarkanSemuaData();
                }
            } catch (err) {
                console.error(err);
                alert("Gagal koneksi ke database.");
            }
        });

        // 3. AMBIL DATA REALTIME & SEBAR KE UI RINGKASAN, TAB MATRIX, & TAB RIWAYAT
        async function segarkanSemuaData() {
            try {
                const res = await fetch(`${DB_URL}/iuran_sampah.json`);
                const data = await res.json();
                
                const tBodyRiwayat = document.getElementById('tabelRiwayat');
                const tBodyMatrix = document.getElementById('bodyMatrixWarga');
                
                tBodyRiwayat.innerHTML = "";
                tBodyMatrix.innerHTML = "";

                if (!data) {
                    tBodyRiwayat.innerHTML = `<tr><td colspan="4" class="py-4 text-center text-slate-300">Kosong</td></tr>`;
                    tBodyMatrix.innerHTML = `<tr><td colspan="13" class="py-4 text-center text-slate-300">Kosong</td></tr>`;
                    return;
                }

                let totalKas = 0;
                let transaksiBulanIniCount = 0;
                const currentMonthName = DAFTAR_BULAN[new Date().getMonth()];
                const petaWarga = {};

                Object.keys(data).forEach(key => {
                    const item = data[key];
                    const nominalAngka = parseInt(item.nominal) || 0;
                    totalKas += nominalAngka;

                    if(item.bulan === currentMonthName) {
                        transaksiBulanIniCount++;
                    }

                    const namaKey = item.nama_warga.toUpperCase().trim();
                    if (!petaWarga[namaKey]) {
                        petaWarga[namaKey] = {};
                    }
                    petaWarga[namaKey][item.bulan] = true;
                });

                document.getElementById('statTotalSaldo').innerText = `Rp ${totalKas.toLocaleString('id-ID')}`;
                document.getElementById('statTransaksiBulan').innerText = `${transaksiBulanIniCount} Transaksi`;

                // RENDER TAB RIWAYAT (DIURUTKAN TERBARU)
                Object.keys(data).reverse().forEach(key => {
                    const item = data[key];
                    const linkKuitansi = `https://sikumel-ux.github.io/Tuntas/kuitansi/?id=${item.token_kuitansi}`;
                    
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition";
                    tr.innerHTML = `
                        <td class="py-3 font-bold text-slate-700 uppercase">${item.nama_warga}</td>
                        <td class="py-3 text-slate-500 font-semibold">${item.bulan}</td>
                        <td class="py-3 text-emerald-600 font-extrabold">Rp ${parseInt(item.nominal).toLocaleString('id-ID')}</td>
                        <td class="py-3 text-right space-x-1 whitespace-nowrap">
                            <button onclick="salinLink('${linkKuitansi}')" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-2 py-1 rounded-lg text-[10px] font-bold transition"><i class="fa-regular fa-copy"></i></button>
                            <a href="${linkKuitansi}" target="_blank" class="bg-emerald-50 text-emerald-600 hover:bg-emerald-100 px-2 py-1 rounded-lg text-[10px] font-bold transition inline-block"><i class="fa-solid fa-eye"></i></a>
                        </td>
                    `;
                    tBodyRiwayat.appendChild(tr);
                });

                // RENDER TAB MATRIX TAHUNAN
                Object.keys(petaWarga).sort().forEach(wargaName => {
                    const trMatrix = document.createElement('tr');
                    trMatrix.className = "hover:bg-slate-50 border-b border-slate-100 row-warga-item";
                    
                    let kolomBulanHtml = "";
                    DAFTAR_BULAN.forEach(bln => {
                        if (petaWarga[wargaName][bln]) {
                            kolomBulanHtml += `<td class="p-2 border border-slate-100 text-emerald-500 font-bold text-sm"><i class="fa-solid fa-circle-check"></i></td>`;
                        } else {
                            kolomBulanHtml += `<td class="p-2 border border-slate-100 text-slate-300">-</td>`;
                        }
                    });

                    trMatrix.innerHTML = `
                        <td class="p-2 text-left font-bold text-slate-700 border border-slate-100 col-nama-warga uppercase">${wargaName}</td>
                        ${kolomBulanHtml}
                    `;
                    tBodyMatrix.appendChild(trMatrix);
                });

            } catch (err) {
                console.error(err);
            }
        }

        // FILTER REALTIME PENCARIAN DI TAB MATRIX
        function filterTabelWarga() {
            const input = document.getElementById("cariWarga").value.toUpperCase();
            const rows = document.getElementsByClassName("row-warga-item");

            for (let i = 0; i < rows.length; i++) {
                const namaKolom = rows[i].getElementsByClassName("col-nama-warga")[0];
                if (namaKolom) {
                    const teksNama = namaKolom.textContent || namaKolom.innerText;
                    if (teksNama.toUpperCase().indexOf(input) > -1) {
                        rows[i].style.display = "";
                    } else {
                        rows[i].style.display = "none";
                    }
                }
            }
        }

        function salinLink(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("Link kuitansi disalin!");
            });
        }

        window.onload = segarkanSemuaData;
    </script>
</body>
</html>
