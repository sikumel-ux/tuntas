<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNTAS - Admin RT 04</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #064e3b; }
    </style>
</head>
<body class="bg-slate-50 pb-20">

<!-- 1. TAB KAS (HALAMAN DEPAN) -->
<div id="tab-kas" class="tab-content active p-4">
    <h2 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">Dashboard Keuangan</h2>
    
    <!-- Card Total Kas -->
    <div class="bg-emerald-900 text-white p-6 rounded-3xl shadow-lg mb-4">
        <p class="text-[10px] opacity-70 uppercase font-bold">Total Saldo Kas</p>
        <h1 id="totalKas" class="text-3xl font-black my-1">Rp 0</h1>
    </div>

    <!-- Grid Pemasukan & Pengeluaran -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-white p-4 rounded-2xl border shadow-sm">
            <p class="text-[9px] text-slate-400 font-bold uppercase">Pemasukan</p>
            <h3 id="totalMasuk" class="text-emerald-600 font-black">Rp 0</h3>
        </div>
        <div class="bg-white p-4 rounded-2xl border shadow-sm">
            <p class="text-[9px] text-slate-400 font-bold uppercase">Pengeluaran</p>
            <h3 id="totalKeluar" class="text-rose-600 font-black">Rp 0</h3>
        </div>
    </div>
    
    <button onclick="switchTab('tab-tambah-kas')" class="w-full bg-emerald-800 text-white py-3 rounded-xl text-xs font-black uppercase">Tambah Transaksi</button>
</div>

<!-- 2. TAB LAINNYA (WARGA, SAMPAH, INFO) -->
<div id="tab-warga" class="tab-content p-4">
    <h2 class="text-sm font-black text-slate-800 uppercase mb-4">Data Warga</h2>
    <!-- List warga kamu di sini -->
</div>

<div id="tab-sampah" class="tab-content p-4">
    <h2 class="text-sm font-black text-slate-800 uppercase mb-4">Setor Sampah</h2>
    <!-- Form setor sampah kamu di sini -->
</div>

<div id="tab-tambah-kas" class="tab-content p-4">
    <h2 class="text-sm font-black text-slate-800 uppercase mb-4">Form Transaksi</h2>
    <!-- Form input kas kamu di sini -->
</div>

<!-- BOTTOM NAVIGATION -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex justify-around shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-50">
    <button onclick="switchTab('tab-kas')" class="nav-btn active flex flex-col items-center text-slate-400 text-[10px] font-black"><i class="fa-solid fa-wallet text-lg"></i> KAS</button>
    <button onclick="switchTab('tab-warga')" class="nav-btn flex flex-col items-center text-slate-400 text-[10px] font-black"><i class="fa-solid fa-users text-lg"></i> WARGA</button>
    <button onclick="switchTab('tab-sampah')" class="nav-btn flex flex-col items-center text-slate-400 text-[10px] font-black"><i class="fa-solid fa-trash-can text-lg"></i> SAMPAH</button>
    <button onclick="switchTab('tab-info')" class="nav-btn flex flex-col items-center text-slate-400 text-[10px] font-black"><i class="fa-solid fa-bullhorn text-lg"></i> INFO</button>
</nav>

<script>
    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(id).classList.add('active');
        
        // Update nav active state
        const navMap = { 'tab-kas': 0, 'tab-warga': 1, 'tab-sampah': 2, 'tab-info': 3 };
        if(navMap.hasOwnProperty(id)) {
            document.querySelectorAll('.nav-btn')[navMap[id]].classList.add('active');
        }
    }
</script>
</body>
</html>
