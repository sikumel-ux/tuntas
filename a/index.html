<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNTAS - Admin RT 04</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-link.active { color: #064e3b; border-bottom: 2px solid #064e3b; }
    </style>
</head>
<body class="bg-gray-100 pb-24">

<!-- HEADER DASHBOARD KAS -->
<div id="tab-kas" class="tab-content active">
    <div class="bg-emerald-900 p-6 text-white shadow-lg">
        <h1 class="text-sm font-bold opacity-80">SALDO KAS RT 04</h1>
        <div id="totalSaldo" class="text-4xl font-black my-2">Rp 0</div>
        <div class="flex gap-4 mt-4">
            <div class="flex-1 bg-emerald-800 p-3 rounded-lg">
                <p class="text-[10px] uppercase opacity-70">Pemasukan</p>
                <div id="textMasuk" class="font-bold">Rp 0</div>
            </div>
            <div class="flex-1 bg-emerald-800 p-3 rounded-lg">
                <p class="text-[10px] uppercase opacity-70">Pengeluaran</p>
                <div id="textKeluar" class="font-bold">Rp 0</div>
            </div>
        </div>
    </div>
    
    <div class="p-4">
        <h2 class="text-xs font-bold text-gray-500 uppercase mb-3">Riwayat Transaksi</h2>
        <div id="listTransaksi" class="bg-white rounded-lg shadow p-2 divide-y">
            <!-- Data transaksi akan muncul di sini -->
        </div>
    </div>
</div>

<!-- TAB LAINNYA (WARGA, SAMPAH, INFO) -->
<div id="tab-warga" class="tab-content p-4">
    <h2 class="font-bold text-lg mb-4">Manajemen Warga</h2>
    <div id="listWarga" class="space-y-2"></div>
</div>

<div id="tab-sampah" class="tab-content p-4">
    <h2 class="font-bold text-lg mb-4">Setor Sampah</h2>
</div>

<div id="tab-info" class="tab-content p-4">
    <h2 class="font-bold text-lg mb-4">Pengumuman</h2>
</div>

<!-- BOTTOM NAVIGATION -->
<div class="fixed bottom-0 w-full bg-white border-t flex justify-around p-3 shadow-lg">
    <button onclick="switchTab('tab-kas')" class="nav-link active flex flex-col items-center text-xs font-bold p-1"><i class="fa-solid fa-wallet"></i> KAS</button>
    <button onclick="switchTab('tab-warga')" class="nav-link flex flex-col items-center text-xs font-bold p-1"><i class="fa-solid fa-users"></i> WARGA</button>
    <button onclick="switchTab('tab-sampah')" class="nav-link flex flex-col items-center text-xs font-bold p-1"><i class="fa-solid fa-trash-can"></i> SAMPAH</button>
    <button onclick="switchTab('tab-info')" class="nav-link flex flex-col items-center text-xs font-bold p-1"><i class="fa-solid fa-bullhorn"></i> INFO</button>
</div>

<script>
    const DB_URL = "https://tuntas-04-default-rtdb.asia-southeast1.firebasedatabase.app";

    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // Fungsi Ambil Data Kas (Simulasi struktur lama)
    async function init() {
        const res = await fetch(`${DB_URL}/kas_rt04.json`);
        const data = await res.json();
        
        let masuk = 0, keluar = 0;
        if(data) {
            Object.values(data).forEach(t => {
                if(t.jenis === 'masuk') masuk += parseInt(t.nominal);
                else keluar += parseInt(t.nominal);
            });
        }
        
        document.getElementById('totalSaldo').innerText = `Rp ${(masuk - keluar).toLocaleString()}`;
        document.getElementById('textMasuk').innerText = `Rp ${masuk.toLocaleString()}`;
        document.getElementById('textKeluar').innerText = `Rp ${keluar.toLocaleString()}`;
    }

    init();
</script>
</body>
</html>
