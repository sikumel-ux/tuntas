<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS - Bukti Pembayaran Resmi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 16px 16px;
        }
        .receipt-card {
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.08);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4 antialiased selection:bg-emerald-100">

    <div class="w-full max-w-md mx-auto my-auto pt-4 animate-fade-in">
        
        <div class="receipt-card bg-white rounded-[2.5rem] overflow-hidden relative border border-slate-100">
            
            <div class="h-8 bg-[#064e3b] w-full rounded-b-[1.5rem]"></div>

            <div class="p-6 text-center space-y-6">
                <div class="space-y-1 pt-2">
                    <h1 class="text-2xl font-extrabold text-[#064e3b] tracking-wider">TUNTAS.</h1>
                    <p class="text-[9px] font-extrabold text-[#059669] uppercase tracking-widest">Turun Tangan Atasi Sampah</p>
                </div>

                <div class="space-y-2">
                    <h2 class="text-lg font-extrabold text-slate-800 uppercase tracking-wide">Bukti Pembayaran</h2>
                    <div class="w-10 h-1 bg-[#059669] mx-auto rounded-full"></div>
                </div>

                <p class="text-xs text-slate-500 font-semibold leading-relaxed px-2">
                    Diterima dari Bapak/Ibu <span id="lblWarga" class="text-slate-800 font-extrabold uppercase">...</span>, untuk iuran sampah bulan <span id="lblBulan" class="text-slate-800 font-extrabold uppercase">...</span>, sebesar:
                </p>

                <div class="bg-emerald-50/60 border border-emerald-100/50 rounded-[2rem] p-6 space-y-2">
                    <h3 id="lblNominal" class="text-3xl font-extrabold text-[#064e3b] tracking-tight">Rp 0</h3>
                    <p id="lblTerbilang" class="text-[9px] font-bold text-[#059669] italic uppercase tracking-wider">~ ... ~</p>
                </div>

                <div class="flex justify-center pt-2">
                    <div class="p-3 bg-white border border-slate-100 rounded-2xl shadow-sm">
                        <div id="qrcode"></div>
                    </div>
                </div>

                <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest pt-2">
                    Terima Kasih Atas Partisipasi Anda
                </p>

                <div class="grid grid-cols-2 gap-4 pt-4 border-t border-dashed border-slate-200 text-left">
                    <div class="bg-slate-50 border border-slate-100/80 p-3 rounded-2xl space-y-0.5">
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wide">Tanggal : <span id="lblTanggal" class="text-slate-700 font-bold">...</span></p>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wide">ID : <span id="lblToken" class="text-slate-700 font-mono font-bold">...</span></p>
                    </div>
                    
                    <div class="flex flex-col justify-center items-end text-right pr-2">
                        <p class="text-[8px] font-black text-slate-400 uppercase tracking-wider">Pengurus Tuntas</p>
                        <p id="lblPengurus" class="text-xs font-extrabold text-[#064e3b] uppercase tracking-wide mt-0.5">PENGURUS RT 04</p>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <div class="w-full text-center py-6">
        <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest space-x-1">
            <span>Generated By</span>
            <span class="text-slate-500">Tuntas Management</span>
        </p>
    </div>

    <script>
        const DB_URL = "https://tuntas-04-default-rtdb.asia-southeast1.firebasedatabase.app";

        window.addEventListener('DOMContentLoaded', () => {
            ambilTokenDanMuatData();
        });

        // Jalur pembaca Token otomatis dari link URL browser
        async function ambilTokenDanMuatData() {
            // Mengambil token dari path URL (Contoh: .../kuitansi/T-703805)
            const pathSegments = window.location.pathname.split('/');
            let token = pathSegments[pathSegments.length - 1] || pathSegments[pathSegments.length - 2];
            
            // Fallback cadangan jika kamu tes pake query (?id=T-703805)
            if(!token || token.includes('.html') || token === 'kuitansi') {
                const urlParams = new URLSearchParams(window.location.search);
                token = urlParams.get('id') || "T-000000"; 
            }

            try {
                // Ambil semua database iuran
                const res = await fetch(`${DB_URL}/iuran_sampah.json`);
                const data = await res.json();
                
                if(!data) {
                    tampilkanStatusError("Kuitansi Belum Tercatat");
                    return;
                }

                // Cari row iuran yang memiliki token COCOK
                let dataKetemu = null;
                Object.keys(data).forEach(key => {
                    if(data[key].token_kuitansi === token) {
                        dataKetemu = data[key];
                    }
                });

                if(dataKetemu) {
                    // Update UI isi kuitansi asli
                    document.getElementById('lblWarga').innerText = dataKetemu.nama_warga;
                    document.getElementById('lblBulan').innerText = dataKetemu.bulan;
                    document.getElementById('lblNominal').innerText = `Rp ${parseInt(dataKetemu.nominal).toLocaleString('id-ID')}`;
                    document.getElementById('lblTerbilang').innerText = `~ ${angkaKeTerbilang(dataKetemu.nominal)} RUPIAH ~`;
                    document.getElementById('lblTanggal').innerText = formatTanggalIndo(dataKetemu.tanggal);
                    document.getElementById('lblToken').innerText = dataKetemu.token_kuitansi;
                    
                    // Bikin QR Code otomatis mengarah ke link kuitansi itu sendiri
                    new QRCode(document.getElementById("qrcode"), {
                        text: window.location.href,
                        width: 120,
                        height: 120,
                        colorDark : "#0f172a",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });

                } else {
                    tampilkanStatusError("Token Tidak Valid");
                }

            } catch (err) {
                console.error(err);
                tampilkanStatusError("Koneksi Terputus");
            }
        }

        function tampilkanStatusError(pesan) {
            document.getElementById('lblWarga').innerText = "DATA TIDAK DITEMUKAN";
            document.getElementById('lblBulan').innerText = "NIHIL";
            document.getElementById('lblNominal').innerText = "Rp 0";
            document.getElementById('lblTerbilang').innerText = `~ ${pesan.toUpperCase()} ~`;
            document.getElementById('lblTanggal').innerText = "-";
            document.getElementById('lblToken').innerText = "ERR-404";
        }

        // Helper merubah format tanggal YYYY-MM-DD -> 5 Juni 2026
        function formatTanggalIndo(stringTanggal) {
            if(!stringTanggal) return "-";
            const opsi = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(stringTanggal).toLocaleDateString('id-ID', opsi);
        }

        // Fungsi konversi angka nominal otomatis jadi kata pembaca (Terbilang)
        function angkaKeTerbilang(nilai) {
            const bilangan = ["", "Satu", "Dua", "Tiga", "Empat", "Lima", "Enam", "Tujuh", "Delapan", "Sembilan", "Sepuluh", "Sebelas"];
            let temp = "";
            let n = parseInt(nilai);
            
            if (n < 12) { temp = " " + bilangan[n]; }
            else if (n < 20) { temp = angkaKeTerbilang(n - 10) + " Belas"; }
            else if (n < 100) { temp = angkaKeTerbilang(Math.floor(n / 10)) + " Puluh" + angkaKeTerbilang(n % 10); }
            else if (n < 200) { temp = " Seratus" + angkaKeTerbilang(n - 100); }
            else if (n < 1000) { temp = angkaKeTerbilang(Math.floor(n / 100)) + " Ratus" + angkaKeTerbilang(n % 100); }
            else if (n < 2000) { temp = " Seribu" + angkaKeTerbilang(n - 1000); }
            else if (n < 1000000) { temp = angkaKeTerbilang(Math.floor(n / 1000)) + " Ribu" + angkaKeTerbilang(n % 1000); }
            return temp.trim();
        }
    </script>
</body>
</html>
