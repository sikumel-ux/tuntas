<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#064E3B">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS - Panel Pengurus RT 04</title>
    
    <!-- ICONS & FONTS -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- TAILWIND & CUSTOM FIGMA CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="kas.css">
</head>
<body class="bg-slate-50 text-slate-800">

<!-- LOADING OVERLAY -->
<div id="loading" class="loading-overlay">
    <div class="text-center space-y-2">
        <div class="w-8 h-8 border-4 border-emerald-900 border-t-transparent rounded-full animate-spin mx-auto"></div>
        <p class="text-xs font-black uppercase tracking-wider text-emerald-950">Mengambil Data Kas Sheets...</p>
    </div>
</div>

<!-- MODAL ALERT KUSTOM -->
<div id="customAlert" class="modal" style="z-index: 300;">
    <div class="modal-content text-center space-y-4 figma-shadow">
        <div id="alertIcon" class="w-12 h-12 mx-auto rounded-full flex items-center justify-center"></div>
        <h4 id="alertTitle" class="font-black text-slate-800 uppercase text-sm"></h4>
        <p id="alertMsg" class="text-xs font-semibold text-slate-500 leading-relaxed"></p>
        <button id="btnAlertClose" class="w-full bg-slate-900 text-white p-3 rounded-xl font-black uppercase text-xs tracking-wider">Oke</button>
    </div>
</div>

<!-- TOP NAVIGATION BAR -->
<div class="bg-emerald-900 text-white sticky top-0 z-50 shadow-md">
    <div class="max-w-md mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <span class="material-symbols-rounded text-2xl text-emerald-300">admin_panel_settings</span>
            <div>
                <h1 class="text-sm font-black uppercase tracking-wider">PANEL KAS RT 04</h1>
                <p class="text-[10px] text-emerald-200 font-bold">Spreadsheet Terintegrasi</p>
            </div>
        </div>
        <button id="btnKeluar" class="bg-emerald-800 hover:bg-red-700 p-2.5 rounded-xl transition-colors flex items-center justify-center">
            <span class="material-symbols-rounded text-sm">logout</span>
        </button>
    </div>
</div>

<!-- MAIN CONTENT CONTAINER -->
<div class="max-w-md mx-auto p-6 space-y-6 mb-24">
    
    <!-- KARTU INPUT TRANSAKSI KAS -->
    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm figma-shadow space-y-4">
        <div class="flex items-center space-x-2 text-emerald-900">
            <span class="material-symbols-rounded">account_balance_wallet</span>
            <h3 class="text-xs font-black uppercase tracking-wider">Input Transaksi Kas Baru</h3>
        </div>
        
        <div class="space-y-3">
            <div>
                <label class="text-[9px] font-bold text-slate-400 ml-2 uppercase">Keterangan</label>
                <input type="text" id="kasKeterangan" class="modern-in mt-1" placeholder="Contoh: Kas Bulanan, Sembako, dll">
            </div>
            <div>
                <label class="text-[9px] font-bold text-slate-400 ml-2 uppercase">Jumlah (Rp)</label>
                <input type="number" id="kasJumlah" class="modern-in mt-1" placeholder="Contoh: 50000">
            </div>
            <div>
                <label class="text-[9px] font-bold text-slate-400 ml-2 uppercase">Jenis Transaksi</label>
                <select id="kasJenis" class="modern-in mt-1">
                    <option value="Masuk">Pemasukan (Kas Masuk)</option>
                    <option value="Keluar">Pengeluaran (Kas Keluar)</option>
                </select>
            </div>
            <button id="btnSimpanKas" class="w-full bg-emerald-900 hover:bg-emerald-950 text-white p-4 rounded-2xl font-black uppercase text-xs tracking-wider shadow-md transition-all active:scale-95 mt-2">
                Simpan Transaksi
            </button>
        </div>
    </div>

    <!-- KARTU LIST RIWAYAT KAS FROM GOOGLE SHEETS -->
    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm figma-shadow space-y-4">
        <div class="flex items-center justify-between border-b border-slate-100 pb-3">
            <div class="flex items-center space-x-2 text-slate-800">
                <span class="material-symbols-rounded">history</span>
                <h3 class="text-xs font-black uppercase tracking-wider">Riwayat Transaksi Kas (<span id="totalTransaksi">0</span>)</h3>
            </div>
            <button id="btnRefreshKas" class="text-emerald-800 font-bold text-xs flex items-center space-x-1 hover:underline">
                <span class="material-symbols-rounded text-sm">refresh</span>
            </button>
        </div>

        <!-- LIST CONTAINER TRANSAKSI -->
        <div id="listKasContainer" class="space-y-3 max-h-[400px] overflow-y-auto pr-1">
            <p class="text-center text-xs font-bold text-slate-400 py-6">Memuat riwayat kas dari Google Sheets...</p>
        </div>
    </div>
</div>

<!-- FLOATING BACK TO APPLICATION -->
<div class="fixed bottom-6 left-0 right-0 max-w-md mx-auto px-6 z-40">
    <a href="index.html" class="flex items-center justify-center space-x-2 bg-slate-900 text-white p-4 rounded-2xl shadow-xl font-black uppercase text-xs tracking-wider text-center active:scale-95 transition-all">
        <span class="material-symbols-rounded text-sm">home</span>
        <span>Kembali ke Log In</span>
    </a>
</div>

<script>
    // API Google Apps Script Web App (TUNTAS Spreadsheet ID: 1EMMQM2aDZu-iOH4yw97-CxxlEGhhMs9EFx_L_kQCBm8)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx9JsUb0saYvFnH8vpCn2JZu_AzdrXXXmQIcGfMW0dsTvPndFQC_CtKyLhMx_6Kjd_IEg/exec";

    function showLoading() { document.getElementById('loading').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loading').style.display = 'none'; }

    function tuntasAlert(title, message, type = 'success') {
        const el = document.getElementById('customAlert');
        const icon = document.getElementById('alertIcon');
        document.getElementById('alertTitle').innerText = title;
        document.getElementById('alertMsg').innerText = message;
        
        if (type === 'error') {
            icon.className = "w-12 h-12 mx-auto rounded-full flex items-center justify-center bg-red-50 text-red-600";
            icon.innerHTML = '<span class="material-symbols-rounded">gpp_maybe</span>';
        } else {
            icon.className = "w-12 h-12 mx-auto rounded-full flex items-center justify-center bg-emerald-50 text-emerald-600";
            icon.innerHTML = '<span class="material-symbols-rounded">check_circle</span>';
        }
        el.style.display = 'flex';
    }

    document.getElementById('btnAlertClose').addEventListener('click', () => {
        document.getElementById('customAlert').style.display = 'none';
    });

    function formatRupiah(angka) {
        return "Rp " + parseFloat(angka).toLocaleString('id-ID');
    }

    // 1. FUNGSI AMBIL DATA KAS DARI SPREADSHEET
    function muatDataKasSheets() {
        showLoading();
        const container = document.getElementById('listKasContainer');
        
        fetch(`${SCRIPT_URL}?action=readKas`)
            .then(response => response.json())
            .then(data => {
                hideLoading();
                container.innerHTML = "";
                
                if (data && data.length > 0) {
                    document.getElementById('totalTransaksi').innerText = data.length;
                    
                    data.forEach((item) => {
                        const isMsk = item.jenis.toLowerCase() === 'masuk';
                        const card = document.createElement('div');
                        card.className = "flex items-center justify-between p-4 bg-white border border-slate-100 rounded-2xl shadow-sm";
                        
                        card.innerHTML = `
                            <div class="space-y-1">
                                <h4 class="text-xs font-black uppercase text-slate-800">${item.keterangan}</h4>
                                <p class="text-[9px] text-slate-400 font-bold">${item.tanggal || ''}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-black ${isMsk ? 'text-emerald-600' : 'text-red-500'}">
                                    ${isMsk ? '+' : '-'} ${formatRupiah(item.jumlah)}
                                </p>
                                <span class="text-[8px] font-extrabold uppercase px-2 py-0.5 rounded-md ${isMsk ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'}">
                                    ${item.jenis}
                                </span>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = `<p class="text-center text-xs font-bold text-slate-400 py-6">Belum ada transaksi di Google Sheets.</p>`;
                    document.getElementById('totalTransaksi').innerText = "0";
                }
            })
            .catch(err => {
                hideLoading();
                console.error(err);
                container.innerHTML = `<p class="text-center text-xs font-bold text-red-500 py-6">Gagal memuat Sheets. Cek status Web App.</p>`;
            });
    }

    // 2. FUNGSI TAMBAH TRANSAKSI KAS KE SPREADSHEET
    function simpanTransaksiKas() {
        const ket = document.getElementById('kasKeterangan').value.trim();
        const jml = document.getElementById('kasJumlah').value.trim();
        const jns = document.getElementById('kasJenis').value;

        if (!ket || !jml) {
            tuntasAlert("Gagal", "Keterangan dan Jumlah transaksi wajib diisi!", "error");
            return;
        }

        showLoading();

        const formData = new FormData();
        formData.append('action', 'insertKas');
        formData.append('keterangan', ket);
        formData.append('jumlah', jml);
        formData.append('jenis', jns);

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(result => {
            hideLoading();
            if(result.status === 'success' || result.result === 'success') {
                tuntasAlert("Berhasil", "Transaksi kas berhasil disimpan ke Google Sheets!");
                document.getElementById('kasKeterangan').value = "";
                document.getElementById('kasJumlah').value = "";
                muatDataKasSheets(); 
            } else {
                tuntasAlert("Gagal", "Gagal menyimpan ke Sheets.", "error");
            }
        })
        .catch(err => {
            hideLoading();
            console.error(err);
            tuntasAlert("Error", "Terjadi kesalahan jaringan ke Web App.", "error");
        });
    }

    // EVENT LISTENERS
    document.getElementById('btnSimpanKas').addEventListener('click', simpanTransaksiKas);
    document.getElementById('btnRefreshKas').addEventListener('click', muatDataKasSheets);
    document.getElementById('btnKeluar').addEventListener('click', () => {
        localStorage.clear();
        window.location.href = "index.html";
    });

    // AMBIL DATA OTOMATIS SAAT HALAMAN DIBUKA
    window.addEventListener('DOMContentLoaded', () => {
        muatDataKasSheets();
    });
</script>
</body>
</html>
