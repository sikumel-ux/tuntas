<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Halaman Tidak Ditemukan - TUNTAS</title>
    
    <!-- Tailwind CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #F1F5F9; 
            background-image: radial-gradient(circle at 2px 2px, #E2E8F0 1px, transparent 0);
            background-size: 24px 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .bento-card { 
            background: white; 
            border-radius: 2.5rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 380px;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .line-accent { 
            height: 16px; 
            background: #DC2626; /* Aksen merah tanda error */
            width: 100%; 
            position: absolute; 
            top: 0; 
            left: 0;
            z-index: 10;
        }
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 
            0%, 100% { transform: translateY(0px) rotate(0deg); } 
            50% { transform: translateY(-10px) rotate(3deg); } 
        }
        .sekawan-footer {
            margin-top: 24px;
            text-align: center;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <!-- Kartu Utama Bento Error 404 -->
    <div class="bento-card p-10 text-center">
        <!-- Garis Aksen Merah -->
        <div class="line-accent"></div>
        
        <!-- Wadah Logo Tuntas dengan Efek Mengambang -->
        <div class="flex justify-center mb-6 mt-6">
            <div class="w-24 h-24 rounded-3xl bg-slate-50 flex items-center justify-center floating border border-slate-100 p-4 shadow-inner">
                <img src="logo.png" alt="Logo Tuntas" class="w-full h-full object-contain filter grayscale opacity-70">
            </div>
        </div>

        <!-- Teks Error -->
        <h1 class="text-7xl font-black text-slate-900 tracking-tighter">404</h1>
        <h2 class="text-lg font-black text-slate-800 uppercase mt-2 tracking-wide text-[14px]">
            Halaman Tersesat
        </h2>
        
        <p class="text-[12px] text-slate-500 leading-relaxed mt-3 px-2">
            Waduh bro, alamat web yang kamu tuju gak ada atau mungkin sudah dipindahkan oleh pengurus.
        </p>

        <!-- Garis Pembatas Dashed -->
        <div class="w-full h-[1px] bg-slate-100 border-t border-dashed border-slate-200 my-6"></div>

        <!-- Tombol Navigasi -->
        <div class="space-y-2">
            <button onclick="window.history.back()" class="w-full bg-slate-900 text-white text-[11px] font-black uppercase tracking-wider py-4 px-6 rounded-2xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Kembali Sebelumnya
            </button>
            
            <a href="index.html" class="w-full bg-emerald-50 text-emerald-800 text-[11px] font-black uppercase tracking-wider py-4 px-6 rounded-2xl active:scale-95 transition-all flex items-center justify-center gap-2 border border-emerald-100">
                <i class="fa-solid fa-house"></i> Menu Utama Warga
            </a>
        </div>
    </div>

    <!-- Footer Branding -->
    <div class="sekawan-footer">
        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.4em]">
            SYSTEM <span class="text-emerald-800">TUNTAS</span> DIKUNCI
        </p>
    </div>

</body>
</html>
