<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Kontrol Admin - TUNTAS Insinerator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans flex min-h-screen">

    <aside class="w-64 bg-slate-950 p-6 flex flex-col justify-between border-r border-slate-800">
        <div>
            <div class="flex items-center gap-3 mb-8">
                <div class="w-8 h-8 bg-emerald-600 rounded-lg flex items-center justify-center text-white"><i class="fas fa-fire-alt"></i></div>
                <span class="font-bold text-lg">TUNTAS Admin</span>
            </div>
            <nav class="space-y-2">
                <a href="#" class="flex items-center gap-3 px-4 py-3 bg-emerald-600 rounded-xl text-sm font-medium transition"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="#" id="menu-kas" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 rounded-xl text-sm text-slate-400 hover:text-white transition"><i class="fas fa-wallet"></i> Kelola Kas</a>
                <a href="#" id="menu-pembakaran" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 rounded-xl text-sm text-slate-400 hover:text-white transition"><i class="fas fa-dumpster shadow-sm"></i> Data Pembakaran</a>
            </nav>
        </div>
        <button id="btn-logout" class="flex items-center gap-3 px-4 py-3 text-red-400 hover:bg-red-950/40 rounded-xl text-sm font-medium transition w-full">
            <i class="fas fa-sign-out-alt"></i> Keluar Sistem
        </button>
    </aside>

    <main class="flex-1 p-8">
        <header class="flex justify-between items-center mb-8 border-b border-slate-800 pb-5">
            <div>
                <h1 class="text-2xl font-bold">Ringkasan Operasional</h1>
                <p class="text-xs text-slate-400 mt-1">Kelola entri log data pembakaran harian dan validasi pembukuan kas.</p>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-sm bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700" id="admin-user">Operator@tuntas.id</span>
            </div>
        </header>

        <section class="bg-slate-950 border border-slate-800 p-6 rounded-2xl mb-8">
            <h3 class="text-md font-semibold mb-4 text-emerald-400"><i class="fas fa-plus-circle mr-2"></i> Tambah Log Logistik Pembakaran</h3>
            <form id="form-pembakaran" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="date" id="input-tanggal" class="bg-slate-900 border border-slate-700 p-2.5 rounded-xl text-sm text-white focus:outline-emerald-500" required>
                <input type="number" id="input-berat" placeholder="Berat Sampah (Kg)" class="bg-slate-900 border border-slate-700 p-2.5 rounded-xl text-sm text-white focus:outline-emerald-500" required>
                <input type="text" id="input-jenis" placeholder="Jenis (Organik / Anorganik)" class="bg-slate-900 border border-slate-700 p-2.5 rounded-xl text-sm text-white focus:outline-emerald-500" required>
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-xl text-sm transition">Simpan Data</button>
            </form>
        </section>

        <section class="bg-slate-950 border border-slate-800 rounded-2xl overflow-hidden shadow-xl">
            <div class="p-5 border-b border-slate-800 flex justify-between items-center">
                <h3 class="font-semibold text-sm">Data Pembakaran Terkini (Firestore Live Feed)</h3>
            </div>
            <table class="w-full text-left border-collapse text-sm">
                <thead>
                    <tr class="bg-slate-900/50 text-slate-400 border-b border-slate-800">
                        <th class="p-4">Tanggal</th>
                        <th class="p-4">Berat (Kg)</th>
                        <th class="p-4">Kategori Sampah</th>
                        <th class="p-4 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="table-pembakaran-body" class="divide-y divide-slate-800/60">
                    </tbody>
            </table>
        </section>
    </main>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
