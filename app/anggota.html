<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#064E3B">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS - Warga Digital Portal</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="gaya.css">
</head>
<body class="bg-slate-50 text-slate-800">

<!-- Loading Server Overlay -->
<div id="loading" class="loading-overlay" style="display: none;">
    <div class="text-center space-y-2">
        <div class="w-8 h-8 border-4 border-white border-t-transparent rounded-full animate-spin mx-auto"></div>
        <p class="text-xs font-bold text-white tracking-widest">MENYINKRONKAN SERVER...</p>
    </div>
</div>

<!-- Custom Premium Alert -->
<div id="customAlert" class="modal" style="z-index: 300;">
    <div class="modal-content text-center space-y-4">
        <div id="alertIcon" class="w-12 h-12 mx-auto rounded-full flex items-center justify-center text-xl font-bold"></div>
        <h4 id="alertTitle" class="font-black text-slate-800 uppercase text-sm"></h4>
        <p id="alertMsg" class="text-xs font-semibold text-slate-500 leading-relaxed"></p>
        <button onclick="closeAlert()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-black uppercase text-xs">Oke</button>
    </div>
</div>

<!-- Main App Wrapper -->
<div id="mainApp" class="max-w-md mx-auto p-5 pb-24">
    
    <!-- Top Header Profile -->
    <header class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <div class="relative group">
                <img id="avatarWarga" src="https://via.placeholder.com/150" alt="Foto Profil" class="w-11 h-11 rounded-2xl object-cover border-2 border-emerald-800/20 shadow-sm bg-slate-100">
                <label for="inputFoto" class="absolute inset-0 flex items-center justify-center bg-black/40 rounded-2xl opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity text-[9px] text-white font-bold uppercase">Ganti</label>
                <input type="file" id="inputFoto" accept="image/*" class="hidden" onchange="handleGantiFoto(this)">
            </div>
            <div>
                <h1 id="namaWarga" class="text-base font-black text-emerald-900 leading-tight">Memuat Nama...</h1>
                <p id="hpWarga" class="text-[10px] font-bold text-slate-400">08xxxxxx</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="reloadData()" title="Sinkron Data" class="w-9 h-9 flex items-center justify-center bg-white border border-slate-100 text-slate-600 rounded-xl transition-all active:scale-90 shadow-sm">
                <i class="fa-solid fa-rotate-right text-sm"></i>
            </button>
            <button onclick="logout()" title="Logout" class="w-9 h-9 flex items-center justify-center bg-rose-50 border border-rose-100 text-rose-600 rounded-xl transition-all active:scale-90 shadow-sm">
                <i class="fa-solid fa-right-from-bracket text-sm"></i>
            </button>
        </div>
    </header>

    <!-- SCREEN 1: HOME/DASHBOARD -->
    <div id="screen-home" class="tab-content active space-y-4">
        <!-- Transparansi Saldo Utama -->
        <div class="p-8 bg-emerald-900 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
            <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest">Saldo Kas Utama RT 04</p>
            <h2 id="totalSaldo" class="text-4xl font-black mt-1">Rp 0</h2>
            <div class="mt-4 pt-4 border-t border-white/10 flex justify-between items-center text-[10px]">
                 <p class="font-bold opacity-50 uppercase">Status Operasional Sampah:</p>
                 <span id="statusSampahWarga" class="font-black px-2.5 py-1 rounded-lg bg-white/10 text-emerald-300">Memuat...</span>
            </div>
        </div>

        <!-- Grid Status Personal Iuran Mandiri -->
        <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm space-y-3">
            <div class="flex justify-between items-center">
                <p class="text-[10px] font-black text-slate-400 uppercase">Iuran Anda Tahun Ini</p>
                <span id="totalIuranLunas" class="text-[10px] font-black text-emerald-800 bg-emerald-50 px-2 py-1 rounded-md">0 Bulan Lunas</span>
            </div>
            <!-- Grid Bulan Kalender Warga -->
            <div id="gridIuranAnggota" class="grid grid-cols-3 gap-2 pt-1 text-center">
                <!-- Diisi via JS -->
            </div>
        </div>

        <!-- Histori Kas Utama RT -->
        <div class="pt-2">
            <h3 class="font-black text-xs text-slate-400 uppercase tracking-tighter mb-3 px-1">5 Histori Transaksi Terkini RT</h3>
            <div id="listRiwayat" class="space-y-2">
                <p class="text-center text-[11px] text-slate-400 py-4 font-semibold">Memuat catatan finansial...</p>
            </div>
        </div>
    </div>

    <!-- SCREEN 2: MUTASI LENGKAP -->
    <div id="screen-mutasi" class="tab-content space-y-4 hidden">
        <h3 class="font-black text-emerald-900 uppercase text-lg px-1">Arus Kas RT 04</h3>
        <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm space-y-3">
            <p class="text-[10px] font-black text-slate-400 uppercase px-1">Filter Jangkauan Tanggal</p>
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="text-[8px] font-bold text-slate-400 ml-2 uppercase">Mulai</label>
                    <input type="date" id="fMulai" onchange="renderMutasiLengkap()" class="modern-in !py-2 !text-[11px]">
                </div>
                <div>
                    <label class="text-[8px] font-bold text-slate-400 ml-2 uppercase">Sampai</label>
                    <input type="date" id="fSelesai" onchange="renderMutasiLengkap()" class="modern-in !py-2 !text-[11px]">
                </div>
            </div>
        </div>
        <div id="listMutasiLengkap" class="space-y-2">
            <!-- Diisi via JS -->
        </div>
    </div>

    <!-- Bottom Navigation Bar Warga -->
    <nav class="fixed bottom-0 inset-x-0 h-20 bg-white border-t flex justify-around items-center px-6 z-50 shadow-lg">
        <button onclick="st('home')" id="n-home" class="active flex flex-col items-center gap-1 text-slate-400 peer-active:text-emerald-900"><span class="material-symbols-rounded">dashboard</span><span class="text-[9px] font-bold">RINGKASAN</span></button>
        <button onclick="st('mutasi')" id="n-mutasi" class="flex flex-col items-center gap-1 text-slate-400"><span class="material-symbols-rounded">receipt_long</span><span class="text-[9px] font-bold">KAS RT</span></button>
    </nav>
</div>

<script src="user.js"></script>
</body>
</html>
