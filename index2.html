<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#064E3B">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS - Masuk Aplikasi</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-modal { position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; width: 100% !important; height: 100% !important; background-color: rgba(15, 23, 42, 0.6) !important; backdrop-filter: blur(4px) !important; display: none; align-items: center !important; justify-content: center !important; padding: 20px !important; z-index: 9999 !important; }
        .auth-card { display: block; }
        .auth-card.hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-emerald-100 flex items-center justify-center min-h-screen p-4">

<div id="notificationAlert" class="fixed top-4 left-1/2 -translate-x-1/2 w-11/12 max-w-sm z-[99999] p-4 rounded-2xl shadow-lg border text-xs font-black uppercase tracking-wide flex items-center gap-2.5 transition-all duration-300 hidden">
    <i id="notifIcon" class="fa-solid text-base"></i>
    <span id="notifText" class="flex-1"></span>
    <button type="button" onclick="closeNotif()" class="opacity-50 hover:opacity-100"><i class="fa-solid fa-xmark"></i></button>
</div>

<div class="w-full max-w-md bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-xl space-y-6 relative overflow-hidden">
    
    <header class="flex flex-col items-center text-center space-y-2 pt-4">
        <img src="logo.png" alt="Logo Tuntas" class="w-16 h-16 object-contain rounded-2xl shadow-sm mb-1" onerror="this.src='https://placehold.co/100x100/064e3b/ffffff?text=Tuntas'">
        <div>
            <h1 class="text-3xl font-black text-emerald-900 leading-none">Tuntas.</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1.5">Sistem Tata Kelola Sampah RT 04</p>
        </div>
    </header>

    <hr class="border-slate-100">

    <div id="cardLogin" class="auth-card space-y-4">
        <div class="text-center">
            <h2 class="text-sm font-black text-slate-700 uppercase tracking-wider">Selamat Datang</h2>
            <p class="text-xs text-slate-400">Silakan masuk menggunakan nomor HP yang terdaftar</p>
        </div>

        <form id="formLogin" onsubmit="prosesLogin(event)" class="space-y-4">
            <div>
                <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Nomor WhatsApp / HP</label>
                <div class="relative mt-1">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400 text-xs">
                        <i class="fa-solid fa-phone"></i>
                    </span>
                    <input type="tel" id="loginUsername" placeholder="Contoh: 081234567890" class="w-full bg-slate-50 border border-slate-100 rounded-xl pl-10 pr-3 py-3 text-xs font-mono font-bold text-slate-700 focus:outline-none focus:border-emerald-600 transition-colors" required>
                </div>
            </div>

            <div>
                <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Kata Sandi (Password)</label>
                <div class="relative mt-1">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400 text-xs">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="loginPassword" placeholder="••••••••" class="w-full bg-slate-50 border border-slate-100 rounded-xl pl-10 pr-10 py-3 text-xs font-bold text-slate-700 focus:outline-none focus:border-emerald-600 transition-colors" required>
                    <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-slate-400 hover:text-slate-600">
                        <i id="eyeIcon" class="fa-solid fa-eye text-xs"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="w-full bg-emerald-900 text-white p-3.5 rounded-xl font-black text-xs uppercase tracking-wider shadow-md transition-all active:scale-95 flex items-center justify-center gap-2 mt-2">
                <span>Masuk Aplikasi</span>
                <i class="fa-solid fa-arrow-right-to-bracket text-[10px]"></i>
            </button>
        </form>
    </div>

    <div id="cardUserSession" class="auth-card hidden space-y-5 text-center py-2">
        <div class="space-y-3">
            <div class="relative w-24 h-24 mx-auto">
                <img id="userAvatar" src="default.png" alt="Foto Profil" class="w-24 h-24 rounded-full object-cover border-4 border-emerald-50 shadow-md" onerror="this.src='https://placehold.co/150x150/064e3b/ffffff?text=User'">
                <button type="button" onclick="openModal('mGantiFoto')" class="absolute bottom-0 right-0 w-8 h-8 rounded-full bg-emerald-900 text-white border-2 border-white flex items-center justify-center shadow-md active:scale-90 transition-all">
                    <i class="fa-solid fa-camera text-[10px]"></i>
                </button>
            </div>
            <div>
                <h3 id="userSessionNama" class="text-base font-black text-slate-800 uppercase">MEMUAT NAMA...</h3>
                <p id="userSessionRole" class="text-[9px] font-bold text-emerald-700 bg-emerald-50 px-2.5 py-0.5 rounded-full inline-block uppercase tracking-wider mt-0.5">Role</p>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-2 pt-2">
            <button id="btnKeDashboard" type="button" class="w-full bg-emerald-950 text-white p-3.5 rounded-xl font-black text-xs uppercase tracking-wider shadow-sm transition-all active:scale-95 flex items-center justify-center gap-2">
                <span>Buka Dashboard Utama</span>
                <i class="fa-solid fa-gauge-high"></i>
            </button>
            <button type="button" onclick="openModal('mGantiPassword')" class="w-full bg-white border border-slate-200 text-slate-600 p-3 rounded-xl font-bold text-xs uppercase transition-all active:scale-95">
                Ubah Password
            </button>
            <button type="button" onclick="prosesLogout()" class="w-full bg-rose-50 text-rose-600 p-3 rounded-xl font-bold text-xs uppercase transition-all active:scale-95">
                Keluar Sesi
            </button>
        </div>
    </div>
</div>

<div id="mGantiPassword" class="custom-modal" onclick="if(event.target==this)closeModal('mGantiPassword')">
    <div class="bg-white w-full max-w-sm rounded-3xl p-5 space-y-4 shadow-xl">
        <div class="flex justify-between items-center border-b pb-2">
            <h3 class="font-black uppercase text-emerald-900 text-xs tracking-wider">Ubah Password Baru</h3>
            <button type="button" onclick="closeModal('mGantiPassword')" class="text-slate-400 text-sm"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div>
            <label class="text-[9px] font-bold text-slate-400 uppercase">Masukkan Password Baru</label>
            <input type="password" id="newPasswordInput" placeholder="Minimal 6 karakter" class="w-full mt-1 bg-slate-50 border rounded-xl p-2.5 text-xs font-bold text-slate-700 focus:outline-none" required>
        </div>
        <button type="button" onclick="simpanPasswordBaru()" class="w-full bg-emerald-900 text-white p-3 rounded-xl text-xs font-black uppercase tracking-wide transition-all active:scale-95">Simpan Password Baru</button>
    </div>
</div>

<div id="mGantiFoto" class="custom-modal" onclick="if(event.target==this)closeModal('mGantiFoto')">
    <div class="bg-white w-full max-w-sm rounded-3xl p-5 space-y-4 shadow-xl">
        <div class="flex justify-between items-center border-b pb-2">
            <h3 class="font-black uppercase text-emerald-900 text-xs tracking-wider">Update Foto Profil</h3>
            <button type="button" onclick="closeModal('mGantiFoto')" class="text-slate-400 text-sm"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div>
            <label class="text-[9px] font-bold text-slate-400 uppercase">Masukkan URL Link Foto Baru</label>
            <input type="text" id="newFotoUrlInput" placeholder="Contoh: https://linkfoto.com/gambar.png" class="w-full mt-1 bg-slate-50 border rounded-xl p-2.5 text-xs focus:outline-none" required>
            <p class="text-[9px] text-slate-400 mt-1 leading-relaxed">Masukkan link URL foto eksternal kamu. Jika ingin mengembalikan ke gambar bawaan awal, ketik kembali <span class="font-mono text-emerald-800">default.png</span>.</p>
        </div>
        <button type="button" onclick="simpanFotoProfilBaru()" class="w-full bg-emerald-900 text-white p-3 rounded-xl text-xs font-black uppercase tracking-wide transition-all active:scale-95">Update Foto Profil</button>
    </div>
</div>

<script>
    // URL REST API Endpoint node akun Firebase Realtime Database
    const urlAdmin = "https://tuntas04-default-rtdb.firebaseio.com/admin.json";
    const urlWarga = "https://tuntas04-default-rtdb.firebaseio.com/warga_rt04.json";

    // Variabel state sesi lokal selama aplikasi aktif
    let sessionUserKey = null;
    let sessionUserRole = null;
    let sessionUserData = null;

    window.addEventListener('DOMContentLoaded', () => {
        // Cek apakah ada session tersimpan di localStorage
        const savedKey = localStorage.getItem('tuntas_session_key');
        const savedRole = localStorage.getItem('tuntas_session_role');
        
        if(savedKey && savedRole) {
            bukaSesiUser(savedKey, savedRole);
        }
    });

    // --------------------------------------------------------
    // CORE ENGINE AUTHENTICATION (SUPER CLEAN & TOLERANT)
    // --------------------------------------------------------
    function prosesLogin(e) {
        e.preventDefault();
        
        // Ambil input dan bersihkan dari spasi tidak sengaja di awal/akhir
        const userInp = document.getElementById('loginUsername').value.trim();
        const passInp = document.getElementById('loginPassword').value.trim();

        // 1. Cek Login ke Node Admin Terlebih Dahulu
        fetch(urlAdmin)
        .then(res => res.json())
        .then(adminData => {
            if(adminData) {
                // Ditambahkan .toString() agar aman jika Firebase membaca nomor HP sebagai angka murni
                const adminKey = Object.keys(adminData).find(key => 
                    adminData[key].username && 
                    adminData[key].username.toString().trim() === userInp && 
                    adminData[key].password && 
                    adminData[key].password.toString().trim() === passInp
                );
                
                if(adminKey) {
                    simpanSesiLokal(adminKey, 'admin');
                    return;
                }
            }

            // 2. Jika Bukan Admin, Lanjut Cek Login ke Node Warga_rt04
            return fetch(urlWarga)
            .then(res => res.json())
            .then(wargaData => {
                if(wargaData) {
                    // Ditambahkan .toString() dan pengaman null-check untuk data warga
                    const wargaKey = Object.keys(wargaData).find(key => 
                        wargaData[key].username && 
                        wargaData[key].username.toString().trim() === userInp && 
                        wargaData[key].password && 
                        wargaData[key].password.toString().trim() === passInp
                    );
                    
                    if(wargaKey) {
                        if(wargaData[wargaKey].status_aktif === false) {
                            showNotif('Akun warga dinonaktifkan pengurus!', 'gagal');
                            return;
                        }
                        simpanSesiLokal(wargaKey, 'warga');
                        return;
                    }
                }
                // Jika tidak ditemukan kecocokan data sama sekali setelah dibersihkan
                showNotif('No HP atau Password salah!', 'gagal');
            });
        })
        .catch((err) => {
            console.error(err);
            showNotif('Gagal menghubungkan ke Firebase', 'gagal');
        });
    }

    function simpanSesiLokal(key, role) {
        localStorage.setItem('tuntas_session_key', key);
        localStorage.setItem('tuntas_session_role', role);
        showNotif('Login Berhasil!', 'sukses');
        setTimeout(() => bukaSesiUser(key, role), 1000);
    }

    function bukaSesiUser(key, role) {
        sessionUserKey = key;
        sessionUserRole = role;
        
        const targetUrl = (role === 'admin') ? `https://tuntas04-default-rtdb.firebaseio.com/admin/${key}.json` : `https://tuntas04-default-rtdb.firebaseio.com/warga_rt04/${key}.json`;

        fetch(targetUrl)
        .then(res => res.json())
        .then(user => {
            if(!user) { prosesLogout(); return; }
            sessionUserData = user;

            // Update UI Profil Sesi
            document.getElementById('userSessionNama').innerText = user.nama;
            document.getElementById('userSessionRole').innerText = (role === 'admin') ? 'Pengurus RT 04' : `Warga (Gabung: ${user.bulan_bergabung || '-'})`;
            
            // Pengondisian Gambar Profil Bawaan
            const imgEl = document.getElementById('userAvatar');
            if(user.foto && user.foto !== 'default.png') {
                imgEl.src = user.foto;
            } else {
                imgEl.src = 'https://placehold.co/150x150/064e3b/ffffff?text=' + user.nama.substring(0,2);
            }

            // Atur Alur Navigasi Tombol Dashboard Utama
            const btnDash = document.getElementById('btnKeDashboard');
            if(role === 'admin') {
                btnDash.onclick = () => { window.location.href = 'admin/fb.html'; }; 
            } else {
                btnDash.onclick = () => { window.location.href = 'user/dashboard.html'; }; 
            }

            // Sembunyikan form login, tampilkan panel sesi profil
            document.getElementById('cardLogin').classList.add('hidden');
            document.getElementById('cardUserSession').classList.remove('hidden');
        });
    }

    function prosesLogout() {
        localStorage.clear();
        sessionUserKey = null;
        sessionUserRole = null;
        sessionUserData = null;
        
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
        
        document.getElementById('cardUserSession').classList.add('hidden');
        document.getElementById('cardLogin').classList.remove('hidden');
        showNotif('Berhasil keluar akun', 'sukses');
    }

    // --------------------------------------------------------
    // PROFILE MANAGEMENT (UPDATE PASSWORD & FOTO PROFIL)
    // --------------------------------------------------------
    function simpanPasswordBaru() {
        const newPass = document.getElementById('newPasswordInput').value.trim();
        if(newPass.length < 6) { alert('Sandi baru terlalu pendek! Minimal 6 karakter.'); return; }

        const baseUrl = (sessionUserRole === 'admin') ? `https://tuntas04-default-rtdb.firebaseio.com/admin/${sessionUserKey}.json` : `https://tuntas04-default-rtdb.firebaseio.com/warga_rt04/${sessionUserKey}.json`;

        fetch(baseUrl, {
            method: 'PATCH',
            body: JSON.stringify({ password: newPass }),
            headers: { 'Content-Type': 'application/json' }
        })
        .then(() => {
            closeModal('mGantiPassword');
            document.getElementById('newPasswordInput').value = '';
            showNotif('Kata sandi berhasil diubah!', 'sukses');
        })
        .catch(() => showNotif('Gagal mengubah password', 'gagal'));
    }

    function simpanFotoProfilBaru() {
        const newFotoUrl = document.getElementById('newFotoUrlInput').value.trim();
        if(!newFotoUrl) { alert('Jalur URL foto tidak boleh kosong!'); return; }

        const baseUrl = (sessionUserRole === 'admin') ? `https://tuntas04-default-rtdb.firebaseio.com/admin/${sessionUserKey}.json` : `https://tuntas04-default-rtdb.firebaseio.com/warga_rt04/${sessionUserKey}.json`;

        fetch(baseUrl, {
            method: 'PATCH',
            body: JSON.stringify({ foto: newFotoUrl }),
            headers: { 'Content-Type': 'application/json' }
        })
        .then(() => {
            closeModal('mGantiFoto');
            document.getElementById('newFotoUrlInput').value = '';
            showNotif('Foto profil diperbarui!', 'sukses');
            bukaSesiUser(sessionUserKey, sessionUserRole); 
        })
        .catch(() => showNotif('Gagal memperbarui foto', 'gagal'));
    }

    // --------------------------------------------------------
    // UI/UX UTILITIES CONTROL
    // --------------------------------------------------------
    function togglePasswordVisibility() {
        const passInp = document.getElementById('loginPassword');
        const eyeIcon = document.getElementById('eyeIcon');
        if (passInp.type === "password") {
            passInp.type = "text";
            eyeIcon.classList.remove('fa-eye');
            eyeIcon.classList.add('fa-eye-slash');
        } else {
            passInp.type = "password";
            eyeIcon.classList.remove('fa-eye-slash');
            eyeIcon.classList.add('fa-eye');
        }
    }

    function showNotif(msg, type) {
        const alertBox = document.getElementById('notificationAlert');
        const icon = document.getElementById('notifIcon');
        const text = document.getElementById('notifText');

        text.innerText = msg;
        alertBox.classList.remove('hidden', 'bg-emerald-50', 'border-emerald-200', 'text-emerald-800', 'bg-rose-50', 'border-rose-200', 'text-rose-800');
        icon.classList.remove('fa-circle-check', 'text-emerald-600', 'fa-circle-xmark', 'text-rose-600');

        if(type === 'sukses') {
            alertBox.classList.add('bg-emerald-50', 'border-emerald-200', 'text-emerald-800');
            icon.classList.add('fa-circle-check', 'text-emerald-600');
        } else {
            alertBox.classList.add('bg-rose-50', 'border-rose-200', 'text-rose-800');
            icon.classList.add('fa-circle-xmark', 'text-rose-600');
        }
        alertBox.classList.remove('hidden');
        setTimeout(() => alertBox.classList.add('hidden'), 4000);
    }

    // Fungsi modal dan notifikasi global
    function closeNotif() { document.getElementById('notificationAlert').classList.add('hidden'); }
    function openModal(id) { document.getElementById(id).style.setProperty('display', 'flex', 'important'); }
    function closeModal(id) { document.getElementById(id).style.setProperty('display', 'none', 'important'); }
</script>

</body>
</html>
